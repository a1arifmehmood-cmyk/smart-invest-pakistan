<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پاک اسمارٹ انویسٹمنٹ - فائنل ورژن</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1b5e20; --bg: #f0f4f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .chart-box { width: 100%; max-width: 300px; margin: 20px auto; }
        .blueprint-img { width: 100%; border-radius: 10px; margin-top: 25px; border: 1px solid #ddd; display: block; }
        .future-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: var(--primary); color: white; padding: 10px; border-radius: 8px; font-size: 12px; }
        h3 { color: var(--primary); margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--primary)">اسمارٹ انویسٹمنٹ کیلکولیٹر</h2>
    <p>اپنی کل رقم درج کریں:</p>
    <input type="number" id="amount" placeholder="مثلاً 5000000">
    <button onclick="updateAll()">پلان اور گراف دیکھیں</button>

    <div id="showResults" style="display:none">
        <div class="chart-box"><canvas id="myChart"></canvas></div>
        
        <div class="future-grid">
            <div class="card">5 سال بعد<br><strong id="y5">0</strong></div>
            <div class="card">10 سال بعد<br><strong id="y10">0</strong></div>
            <div class="card">20 سال بعد<br><strong id="y20">0</strong></div>
        </div>

        <h3>انویسٹمنٹ بلو پرنٹ (تفصیل):</h3>
        <img src="Screenshot_20260404-230236.png" class="blueprint-img" alt="Investment Blueprint">
    </div>
</div>

<script>
let chart = null;
function updateAll() {
    let val = document.getElementById('amount').value;
    if(!val || val <= 0) { alert("براہ کرم درست رقم درج کریں"); return; }
    
    document.getElementById('showResults').style.display = 'block';
    
    // 14% سالانہ منافع کے حساب سے تخمینہ
    const calc = (y) => Math.round(val * Math.pow(1.14, y)).toLocaleString();
    document.getElementById('y5').innerText = "Rs " + calc(5);
    document.getElementById('y10').innerText = "Rs " + calc(10);
    document.getElementById('y20').innerText = "Rs " + calc(20);

    // گراف اپ ڈیٹ کریں
    const ctx = document.getElementById('myChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['سیف فنڈ (40%)', 'انڈیکس (30%)', 'اسٹاک (30%)'],
            datasets: [{ 
                data: [val*0.4, val*0.3, val*0.3], 
                backgroundColor: ['#2e7d32', '#43a047', '#fb8c00'] 
            }]
        },
        options: { plugins: { legend: { position: 'bottom', rtl: true } } }
    });
    
    // اسکرول کر کے نتائج دکھائیں
    window.scrollTo({ top: 500, behavior: 'smooth' });
}
</script>

</body>
</html>
